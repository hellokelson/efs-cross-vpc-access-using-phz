AWSTemplateFormatVersion: "2010-09-09"
Description: >
  EFS PHZ Audit - Periodic inspection of PHZ DNS records for cross-VPC EFS access.
  Detects missing records, IP mismatches, and stale entries.

Parameters:
  PhzIds:
    Type: CommaDelimitedList
    Description: Comma-separated list of PHZ Hosted Zone IDs to audit
  EfsVpcIds:
    Type: CommaDelimitedList
    Description: Comma-separated list of source VPC IDs containing EFS
  AlertEmails:
    Type: CommaDelimitedList
    Description: Comma-separated email addresses for audit alerts
  ScheduleExpression:
    Type: String
    Default: "rate(1 day)"
    Description: >
      EventBridge schedule expression for audit frequency.
      Examples: "rate(1 day)", "rate(12 hours)", "cron(0 2 * * ? *)"
  S3Bucket:
    Type: String
    Description: S3 bucket for Lambda deployment packages
  S3KeyLayer:
    Type: String
    Default: efs-phz-audit/layer.zip
    Description: S3 key for Lambda Layer zip
  S3KeyHandler:
    Type: String
    Default: efs-phz-audit/handler.zip
    Description: S3 key for Lambda handler zip

Resources:
  # ==================== SNS ====================
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-alerts"

  # SNS subscriptions are created by deploy.sh after stack deployment
  # to support variable number of email addresses

  # ==================== IAM ====================
  AuditLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AuditPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EFSReadOnly
                Effect: Allow
                Action:
                  - elasticfilesystem:DescribeFileSystems
                  - elasticfilesystem:DescribeMountTargets
                Resource: "*"
              - Sid: EC2ReadOnly
                Effect: Allow
                Action:
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                Resource: "*"
              - Sid: Route53ReadOnly
                Effect: Allow
                Action:
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                Resource: "arn:aws:route53:::hostedzone/*"
              - Sid: SNSPublish
                Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref AlertTopic
              - Sid: CloudWatchMetrics
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: "*"
                Condition:
                  StringEquals:
                    cloudwatch:namespace: "EFS/PHZAudit"

  # ==================== Lambda Layer ====================
  AuditLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub "${AWS::StackName}-layer"
      Description: Shared library for EFS PHZ Audit
      CompatibleRuntimes:
        - python3.12
      CompatibleArchitectures:
        - arm64
      Content:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3KeyLayer

  # ==================== Lambda Function ====================
  AuditFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-audit"
      Description: EFS PHZ audit - checks DNS record correctness
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Timeout: 120
      MemorySize: 256
      Role: !GetAtt AuditLambdaRole.Arn
      Layers:
        - !Ref AuditLayer
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3KeyHandler
      Environment:
        Variables:
          PHZ_IDS: !Join [",", !Ref PhzIds]
          EFS_VPC_IDS: !Join [",", !Ref EfsVpcIds]
          SNS_TOPIC_ARN: !Ref AlertTopic

  # ==================== EventBridge Schedule ====================
  AuditScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-schedule"
      Description: !Sub "Periodic EFS PHZ audit (${ScheduleExpression})"
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: AuditLambda
          Arn: !GetAtt AuditFunction.Arn

  AuditSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuditFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AuditScheduleRule.Arn

  # ==================== CloudWatch Alarm ====================
  AuditIssueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-issues-detected"
      AlarmDescription: >
        EFS PHZ audit detected issues.
        Alert emails are sent directly by the Lambda function.
        This alarm is for CloudWatch dashboard visibility only.
      Namespace: EFS/PHZAudit
      MetricName: IssueCount
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  AuditFunctionArn:
    Description: Audit Lambda function ARN
    Value: !GetAtt AuditFunction.Arn
  AuditFunctionName:
    Description: Audit Lambda function name (for manual invocation)
    Value: !Ref AuditFunction
  AlertTopicArn:
    Description: SNS topic ARN for alerts
    Value: !Ref AlertTopic
  ManualInvokeCommand:
    Description: CLI command to manually trigger audit
    Value: !Sub >
      aws lambda invoke --function-name ${AuditFunction}
      --region ${AWS::Region} --output json /dev/stdout
